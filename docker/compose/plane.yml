# Plane – Issue Tracker (Szenario B)
# Referenz: https://github.com/makeplane/plane

networks:
  proxy:
    external: true
  plane-internal:

volumes:
  plane-db:
  plane-redis:
  plane-media:

services:
  plane-web:
    image: makeplane/plane-frontend:stable
    container_name: plane-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: https://plane.${DOMAIN}
    networks:
      - proxy
      - plane-internal
    depends_on:
      - plane-api
    labels:
      - traefik.enable=true
      - traefik.http.routers.plane.rule=Host(`plane.${DOMAIN}`)
      - traefik.http.services.plane.loadbalancer.server.port=3000

  plane-api:
    image: makeplane/plane-backend:stable
    container_name: plane-api
    restart: unless-stopped
    command: ./bin/start.sh
    environment:
      DATABASE_URL: postgresql://${PLANE_DB_USER}:${PLANE_DB_PASSWORD}@plane-db:5432/${PLANE_DB_NAME}
      REDIS_URL: ${PLANE_REDIS_URL}
      SECRET_KEY: ${PLANE_SECRET_KEY}
      WEB_URL: https://plane.${DOMAIN}
      CORS_ALLOWED_ORIGINS: https://plane.${DOMAIN}
      MEDIA_URL: https://plane.${DOMAIN}/media/
    volumes:
      - plane-media:/home/app/plane/media
    networks:
      - proxy
      - plane-internal
    depends_on:
      plane-db:
        condition: service_healthy
      plane-redis:
        condition: service_started
    labels:
      - traefik.enable=true
      - traefik.http.routers.plane-api.rule=Host(`plane.${DOMAIN}`) && PathPrefix(`/api`)
      - traefik.http.services.plane-api.loadbalancer.server.port=8000

  plane-worker:
    image: makeplane/plane-backend:stable
    container_name: plane-worker
    restart: unless-stopped
    command: ./bin/worker.sh
    environment:
      DATABASE_URL: postgresql://${PLANE_DB_USER}:${PLANE_DB_PASSWORD}@plane-db:5432/${PLANE_DB_NAME}
      REDIS_URL: ${PLANE_REDIS_URL}
      SECRET_KEY: ${PLANE_SECRET_KEY}
    networks:
      - plane-internal
    depends_on:
      - plane-api

  plane-db:
    image: postgres:16-alpine
    container_name: plane-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PLANE_DB_NAME}
      POSTGRES_USER: ${PLANE_DB_USER}
      POSTGRES_PASSWORD: ${PLANE_DB_PASSWORD}
    volumes:
      - plane-db:/var/lib/postgresql/data
    networks:
      - plane-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PLANE_DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  plane-redis:
    image: redis:7-alpine
    container_name: plane-redis
    restart: unless-stopped
    volumes:
      - plane-redis:/data
    networks:
      - plane-internal
