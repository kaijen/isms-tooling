# Statement of Applicability (SoA) — ISO 27001:2022 Annex A
#
# Single Source of Truth für alle 93 Controls.
# Dieses Dokument wird via CI/CD in die ISMS-Dokumentationssite publiziert.
#
# Felder je Control:
#   applicable:    true | false
#   justification: Begründung der An- oder Nichtanwendbarkeit
#   status:        geplant | in-umsetzung | umgesetzt  (nur wenn applicable: true)
#   measures:      Kurzbeschreibung der umgesetzten oder geplanten Maßnahme
#   evidence:      Verweis auf Nachweisdokument (Pfad im Repo oder URL)
#   owner:         Verantwortliche Rolle
#
# Status-Workflow:
#   geplant → in-umsetzung → umgesetzt
#   Jede Änderung erfordert einen Pull Request (4-Augen-Prinzip).
#   Die Git-History belegt wann ein Control auf welchen Status gesetzt wurde.

meta:
  version:       "1.0"
  status:        "Entwurf"
  effective_date: ""
  next_review:   "2026-01-01"
  owner:         "Informationssicherheitsbeauftragter"
  approved_by:   ""
  approved_date: ""

controls:

  # ── A.5 Organisatorische Maßnahmen (37 Controls) ────────────────────────

  - id: "A.5.1"
    title: "Informationssicherheitsleitlinien"
    category: "Organisatorische Maßnahmen"
    applicable: true
    justification: "Grundlegende Anforderung des ISMS"
    status: "umgesetzt"
    measures: "IS-Leitlinie v1.0 durch Geschäftsführung unterzeichnet und publiziert"
    evidence:
      - type: doc
        ref:   "richtlinien/informationssicherheitsrichtlinie.md"
        label: "Informationssicherheitsleitlinie"
    owner: "ISB"

  - id: "A.5.2"
    title: "Rollen und Verantwortlichkeiten für Informationssicherheit"
    category: "Organisatorische Maßnahmen"
    applicable: true
    justification: "Klare Verantwortlichkeiten sind Voraussetzung für ein funktionierendes ISMS"
    status: "umgesetzt"
    measures: "RACI-Matrix, ISB formal benannt, Rollen in IS-Leitlinie dokumentiert"
    evidence:
      - type: doc
        ref:   "richtlinien/informationssicherheitsrichtlinie.md"
        label: "Informationssicherheitsleitlinie"
    owner: "Geschäftsführung"

  - id: "A.5.3"
    title: "Aufgabentrennung"
    category: "Organisatorische Maßnahmen"
    applicable: true
    justification: "Verhindert Interessenkonflikte und Missbrauch"
    status: "in-umsetzung"
    measures: "Funktionstrennung in kritischen Prozessen (Buchhaltung, Admin-Rechte); vollständige Umsetzung für alle Systeme ausstehend"
    evidence:
      - type: ticket
        ref:   "Risiken::Operativ"
        label: "Risiken aus Rollenkonflikten (OTOBO)"
    owner: "IT-Leitung"

  - id: "A.5.4"
    title: "Verantwortlichkeit des Managements"
    category: "Organisatorische Maßnahmen"
    applicable: true
    justification: "Management-Commitment ist Grundlage des ISMS"
    status: "umgesetzt"
    measures: "IS-Leitlinie unterzeichnet, Ressourcen bereitgestellt, Management in Bewertungen eingebunden"
    evidence:
      - type: doc
        ref:   "richtlinien/informationssicherheitsrichtlinie.md"
        label: "Informationssicherheitsleitlinie"
    owner: "Geschäftsführung"

  - id: "A.5.5"
    title: "Kontakt mit Behörden"
    category: "Organisatorische Maßnahmen"
    applicable: true
    justification: "NIS2-Meldepflichten erfordern definierten Behördenkontakt (BSI)"
    status: "umgesetzt"
    measures: "BSI als primäre NIS2-Meldestelle benannt, Kontaktdaten im Notfallhandbuch"
    evidence:
      - type: doc
        ref:   "richtlinien/incident-response.md"
        label: "Incident-Response-Verfahren"
      - type: ticket
        ref:   "Meldepflichten"
        label: "BSI-Meldungen (OTOBO)"
    owner: "ISB"

  - id: "A.5.6"
    title: "Kontakt mit Interessengruppen"
    category: "Organisatorische Maßnahmen"
    applicable: true
    justification: "Austausch mit IS-Community verbessert Bedrohungslage"
    status: "geplant"
    measures: "Mitgliedschaft in IS-CERT oder Branchenarbeitsgruppe geplant"
    evidence: []
    owner: "ISB"

  - id: "A.5.7"
    title: "Informationen über Bedrohungen (Threat Intelligence)"
    category: "Organisatorische Maßnahmen"
    applicable: true
    justification: "Aktuelle Bedrohungsinformationen verbessern Risikobeurteilung"
    status: "geplant"
    measures: "Abonnement BSI-Warnmeldungen, CERT-Bund-Newsletter; strukturierte Auswertung geplant"
    evidence:
      - type: ticket
        ref:   "Risiken::Strategisch"
        label: "Bedrohungslagen-Risiken (OTOBO)"
    owner: "IT-Leitung"

  - id: "A.5.8"
    title: "Informationssicherheit im Projektmanagement"
    category: "Organisatorische Maßnahmen"
    applicable: true
    justification: "Neue Projekte und Systeme müssen IS-Anforderungen berücksichtigen"
    status: "geplant"
    measures: "IS-Checkliste für neue Projekte in Entwicklung"
    evidence: []
    owner: "ISB"

  - id: "A.5.9"
    title: "Inventar von Information und anderen Assets"
    category: "Organisatorische Maßnahmen"
    applicable: true
    justification: "Asset-Inventar ist Grundlage für Risikobeurteilung und Schutzbedarfsanalyse"
    status: "in-umsetzung"
    measures: "DataGerry als CMDB im Aufbau, Objekt-Typen konfiguriert"
    evidence:
      - type: tool
        ref:   "DataGerry"
        label: "Asset-Inventar (DataGerry)"
    owner: "IT-Leitung"

  - id: "A.5.10"
    title: "Zulässige Nutzung von Information und anderen Assets"
    category: "Organisatorische Maßnahmen"
    applicable: true
    justification: "Klare Nutzungsregeln reduzieren Missbrauchsrisiken"
    status: "geplant"
    measures: "Nutzungsrichtlinie als Bestandteil der Zugangsteuerungsrichtlinie geplant"
    evidence:
      - type: doc
        ref:   "richtlinien/zugriffssteuerung.md"
        label: "Zugangsteuerungsrichtlinie"
    owner: "ISB"

  - id: "A.5.11"
    title: "Rückgabe von Assets"
    category: "Organisatorische Maßnahmen"
    applicable: true
    justification: "Offboarding-Prozess muss Rückgabe aller Assets sicherstellen"
    status: "geplant"
    measures: "Offboarding-Checkliste in Entwicklung"
    evidence: []
    owner: "IT-Leitung"

  - id: "A.5.12"
    title: "Klassifizierung von Informationen"
    category: "Organisatorische Maßnahmen"
    applicable: true
    justification: "Klassifizierung steuert Schutzmaßnahmen und Zugriffsrechte"
    status: "in-umsetzung"
    measures: "VIV-Schema definiert (Vertraulich/Intern/Öffentlich); Anwendung auf alle Assets ausstehend"
    evidence:
      - type: doc
        ref:   "richtlinien/zugriffssteuerung.md"
        label: "Zugangsteuerungsrichtlinie"
      - type: tool
        ref:   "DataGerry"
        label: "Asset-Klassifizierung (DataGerry)"
    owner: "ISB"

  - id: "A.5.13"
    title: "Kennzeichnung von Informationen"
    category: "Organisatorische Maßnahmen"
    applicable: true
    justification: "Kennzeichnung macht Klassifizierung handhabbar"
    status: "geplant"
    measures: "Kennzeichnungsrichtlinie für Dokumente und E-Mails geplant"
    evidence: []
    owner: "ISB"

  - id: "A.5.14"
    title: "Informationsübertragung"
    category: "Organisatorische Maßnahmen"
    applicable: true
    justification: "Vertrauliche Informationen müssen sicher übertragen werden"
    status: "in-umsetzung"
    measures: "TLS für alle Übertragungen; sichere Dateiübertragung für externe Partner in Planung"
    evidence:
      - type: doc
        ref:   "richtlinien/kryptographie.md"
        label: "Kryptographierichtlinie"
    owner: "IT-Leitung"

  - id: "A.5.15"
    title: "Zugangsteuerung"
    category: "Organisatorische Maßnahmen"
    applicable: true
    justification: "Need-to-know-Prinzip ist zentrales Sicherheitsprinzip"
    status: "in-umsetzung"
    measures: "Zugangsteuerungsrichtlinie vorhanden; RBAC teilweise umgesetzt, vollständige Umsetzung ausstehend"
    evidence:
      - type: doc
        ref:   "richtlinien/zugriffssteuerung.md"
        label: "Zugangsteuerungsrichtlinie"
      - type: ticket
        ref:   "Aufgaben::Audit"
        label: "Access-Review-Protokolle (OTOBO)"
    owner: "IT-Leitung"

  - id: "A.5.16"
    title: "Identitätsmanagement"
    category: "Organisatorische Maßnahmen"
    applicable: true
    justification: "Eindeutige Identitäten sind Grundlage für Zugangsteuerung und Audit-Trail"
    status: "in-umsetzung"
    measures: "Active Directory / LDAP als zentrales IdM; persönliche Accounts für alle Nutzer"
    evidence: []
    owner: "IT-Leitung"

  - id: "A.5.17"
    title: "Authentifizierungsinformationen"
    category: "Organisatorische Maßnahmen"
    applicable: true
    justification: "Passwortregeln und sichere Speicherung sind essenziell"
    status: "umgesetzt"
    measures: "Passwort- und Authentifizierungsrichtlinie; Passwort-Manager im Einsatz"
    evidence:
      - type: doc
        ref:   "richtlinien/passwort-und-authentifizierung.md"
        label: "Passwort- und Authentifizierungsrichtlinie"
    owner: "IT-Leitung"

  - id: "A.5.18"
    title: "Zugangsrechte"
    category: "Organisatorische Maßnahmen"
    applicable: true
    justification: "Rechtevergabe und -entzug muss kontrolliert und nachvollziehbar sein"
    status: "in-umsetzung"
    measures: "Prozess für Rechtevergabe/-entzug in Entwicklung; Access Review quartalsweise geplant"
    evidence:
      - type: ticket
        ref:   "Aufgaben::Audit"
        label: "Rechtevergabe/-entzug-Tickets (OTOBO)"
    owner: "IT-Leitung"

  - id: "A.5.19"
    title: "Informationssicherheit in Lieferantenbeziehungen"
    category: "Organisatorische Maßnahmen"
    applicable: true
    justification: "Lieferanten haben Zugang zu sensiblen Systemen und Daten"
    status: "in-umsetzung"
    measures: "Lieferantenrichtlinie vorhanden; Lieferanteninventar in DataGerry im Aufbau"
    evidence:
      - type: doc
        ref:   "richtlinien/lieferanten.md"
        label: "Lieferantenrichtlinie"
      - type: ticket
        ref:   "Aufgaben::Lieferant"
        label: "Lieferantenbewertungen (OTOBO)"
    owner: "ISB"

  - id: "A.5.20"
    title: "Behandlung von IS in Lieferantenvereinbarungen"
    category: "Organisatorische Maßnahmen"
    applicable: true
    justification: "Sicherheitsanforderungen müssen vertraglich verankert sein"
    status: "in-umsetzung"
    measures: "Standardklauseln für Lieferantenverträge in Entwicklung"
    evidence:
      - type: doc
        ref:   "richtlinien/lieferanten.md"
        label: "Lieferantenrichtlinie"
      - type: ticket
        ref:   "Aufgaben::Lieferant"
        label: "Vertragsmanagement (OTOBO)"
    owner: "ISB"

  - id: "A.5.21"
    title: "IS in der IT-Lieferkette"
    category: "Organisatorische Maßnahmen"
    applicable: true
    justification: "Supply-Chain-Angriffe erfordern Kontrolle der Softwarelieferkette"
    status: "geplant"
    measures: "SBOM-Anforderungen und Lieferketten-Risikoanalyse in Planung"
    evidence: []
    owner: "IT-Leitung"

  - id: "A.5.22"
    title: "Überwachung und Änderungsmanagement von Lieferantendienstleistungen"
    category: "Organisatorische Maßnahmen"
    applicable: true
    justification: "Lieferantenleistung und -sicherheitsniveau muss regelmäßig überprüft werden"
    status: "geplant"
    measures: "Jährliche Lieferantenbewertung geplant; OTOBO-Tickets für kritische Lieferanten"
    evidence:
      - type: ticket
        ref:   "Aufgaben::Lieferant"
        label: "Lieferanten-Review-Tickets (OTOBO)"
    owner: "ISB"

  - id: "A.5.23"
    title: "Informationssicherheit bei der Nutzung von Cloud-Diensten"
    category: "Organisatorische Maßnahmen"
    applicable: true
    justification: "Cloud-Dienste werden für ISMS-Stack und Geschäftsbetrieb genutzt"
    status: "in-umsetzung"
    measures: "Cloud-Anbieter in Lieferantenrichtlinie adressiert; Datenresidenz und Exit-Strategie geprüft"
    evidence:
      - type: doc
        ref:   "richtlinien/lieferanten.md"
        label: "Lieferantenrichtlinie"
      - type: ticket
        ref:   "Aufgaben::Lieferant"
        label: "Cloud-Anbieter-Bewertung (OTOBO)"
    owner: "IT-Leitung"

  - id: "A.5.24"
    title: "IS-Vorfallmanagement — Planung und Vorbereitung"
    category: "Organisatorische Maßnahmen"
    applicable: true
    justification: "Strukturierte Vorfallreaktion ist NIS2-Pflicht"
    status: "umgesetzt"
    measures: "Incident-Response-Verfahren dokumentiert; OTOBO-Queue 'Incidents' konfiguriert"
    evidence:
      - type: doc
        ref:   "richtlinien/incident-response.md"
        label: "Incident-Response-Verfahren"
      - type: ticket
        ref:   "Incidents"
        label: "Vorfalltickets (OTOBO)"
    owner: "ISB"

  - id: "A.5.25"
    title: "Beurteilung und Entscheidung über IS-Ereignisse"
    category: "Organisatorische Maßnahmen"
    applicable: true
    justification: "Klassifizierung entscheidet über Eskalation und Meldepflicht"
    status: "umgesetzt"
    measures: "Klassifikationsschema P1-P4 im Incident-Response-Verfahren"
    evidence:
      - type: doc
        ref:   "richtlinien/incident-response.md"
        label: "Incident-Response-Verfahren"
      - type: ticket
        ref:   "Incidents"
        label: "Incident-Klassifikation (OTOBO)"
    owner: "ISB"

  - id: "A.5.26"
    title: "Reaktion auf IS-Vorfälle"
    category: "Organisatorische Maßnahmen"
    applicable: true
    justification: "Definierte Reaktion minimiert Schaden und sichert Nachweisführung"
    status: "umgesetzt"
    measures: "Eskalationskette und Reaktionsschritte dokumentiert; NIS2-Meldefristen integriert"
    evidence:
      - type: doc
        ref:   "richtlinien/incident-response.md"
        label: "Incident-Response-Verfahren"
      - type: ticket
        ref:   "Incidents"
        label: "Reaktions-Tickets (OTOBO)"
    owner: "ISB"

  - id: "A.5.27"
    title: "Erkenntnisse aus IS-Vorfällen"
    category: "Organisatorische Maßnahmen"
    applicable: true
    justification: "Lessons-Learned verhindert Wiederholung"
    status: "in-umsetzung"
    measures: "Post-Incident-Review im Verfahren vorgesehen; regelmäßige Auswertung geplant"
    evidence:
      - type: doc
        ref:   "richtlinien/incident-response.md"
        label: "Incident-Response-Verfahren"
      - type: ticket
        ref:   "Incidents"
        label: "Post-Incident-Reviews (OTOBO)"
    owner: "ISB"

  - id: "A.5.28"
    title: "Beweissicherung"
    category: "Organisatorische Maßnahmen"
    applicable: true
    justification: "Forensische Integrität von Log-Daten für rechtliche und regulatorische Zwecke"
    status: "geplant"
    measures: "Log-Aufbewahrung ≥12 Monate geplant; Chain-of-Custody-Verfahren in Entwicklung"
    evidence:
      - type: ticket
        ref:   "Meldepflichten"
        label: "NIS2-Meldepflicht-Tickets (OTOBO)"
    owner: "IT-Leitung"

  - id: "A.5.29"
    title: "Informationssicherheit bei Disruption"
    category: "Organisatorische Maßnahmen"
    applicable: true
    justification: "Geschäftskontinuität erfordert IS-Maßnahmen auch bei Notfällen"
    status: "in-umsetzung"
    measures: "Notfallhandbuch in Erstellung; BIA für kritische Prozesse durchgeführt"
    evidence:
      - type: doc
        ref:   "richtlinien/notfallhandbuch.md"
        label: "Notfallhandbuch"
      - type: ticket
        ref:   "Aufgaben::Audit"
        label: "BCM-Test-Protokolle (OTOBO)"
    owner: "ISB"

  - id: "A.5.30"
    title: "IKT-Bereitschaft für Geschäftskontinuität"
    category: "Organisatorische Maßnahmen"
    applicable: true
    justification: "IT-Systeme müssen bei Notfall verfügbar bleiben"
    status: "in-umsetzung"
    measures: "Backup-Lösung mit Offsite-Kopie; Wiederherstellungstests quartalsweise geplant"
    evidence:
      - type: doc
        ref:   "richtlinien/backup-und-wiederherstellung.md"
        label: "Backup- und Wiederherstellungsrichtlinie"
      - type: ticket
        ref:   "Aufgaben::Audit"
        label: "Wiederherstellungstest-Protokolle (OTOBO)"
      - type: tool
        ref:   "DataGerry"
        label: "Systemabhängigkeiten (DataGerry)"
    owner: "IT-Leitung"

  - id: "A.5.31"
    title: "Rechtliche, gesetzliche und regulatorische Anforderungen"
    category: "Organisatorische Maßnahmen"
    applicable: true
    justification: "Compliance mit NIS2, DSGVO und branchenspezifischen Vorgaben"
    status: "in-umsetzung"
    measures: "Regulatorische Anforderungen in ISMS-Scope dokumentiert; NIS2-Workflow konfiguriert"
    evidence:
      - type: ticket
        ref:   "Meldepflichten"
        label: "Regulatorische Meldungen (OTOBO)"
    owner: "ISB"

  - id: "A.5.32"
    title: "Rechte an geistigem Eigentum"
    category: "Organisatorische Maßnahmen"
    applicable: true
    justification: "Softwarelizenzen und IP-Rechte müssen kontrolliert werden"
    status: "geplant"
    measures: "Software-Asset-Management und Lizenzüberprüfung geplant"
    evidence: []
    owner: "IT-Leitung"

  - id: "A.5.33"
    title: "Schutz von Aufzeichnungen"
    category: "Organisatorische Maßnahmen"
    applicable: true
    justification: "ISMS-Aufzeichnungen sind Nachweisdokumente für Audits"
    status: "umgesetzt"
    measures: "Git-versionierte Dokumente in Forgejo; Ticket-System für Nachweisführung"
    evidence:
      - type: ticket
        ref:   "Aufgaben::Audit"
        label: "Audit-Aufzeichnungen (OTOBO)"
    owner: "ISB"

  - id: "A.5.34"
    title: "Datenschutz und Schutz personenbezogener Informationen"
    category: "Organisatorische Maßnahmen"
    applicable: true
    justification: "DSGVO-Anforderungen überschneiden sich mit IS-Controls"
    status: "in-umsetzung"
    measures: "DSGVO-Koordination mit DSB; Verarbeitungsverzeichnis in Erstellung"
    evidence: []
    owner: "Datenschutzbeauftragter"

  - id: "A.5.35"
    title: "Unabhängige Überprüfung der Informationssicherheit"
    category: "Organisatorische Maßnahmen"
    applicable: true
    justification: "Externe Überprüfung stellt Objektivität sicher"
    status: "geplant"
    measures: "Zertifizierungsaudit als externe Überprüfung; ggf. zusätzliches Penetration Testing"
    evidence:
      - type: ticket
        ref:   "Aufgaben::Audit"
        label: "Interne Audit-Tickets (OTOBO)"
    owner: "ISB"

  - id: "A.5.36"
    title: "Einhaltung von Leitlinien und Normen"
    category: "Organisatorische Maßnahmen"
    applicable: true
    justification: "Compliance-Überprüfung ist Teil des ISMS-Betriebs"
    status: "in-umsetzung"
    measures: "Interne Audits; automatische Dokumentenprüfung via CI/CD"
    evidence:
      - type: ticket
        ref:   "Aufgaben::Audit"
        label: "Compliance-Prüfungs-Tickets (OTOBO)"
    owner: "ISB"

  - id: "A.5.37"
    title: "Dokumentierte Betriebsabläufe"
    category: "Organisatorische Maßnahmen"
    applicable: true
    justification: "Kritische IT-Prozesse müssen dokumentiert sein"
    status: "in-umsetzung"
    measures: "Betriebsdokumentation in BookStack IT-Betrieb im Aufbau"
    evidence:
      - type: wiki
        ref:   "IT-Betriebsdokumentation"
        label: "Betriebsverfahren (BookStack)"
    owner: "IT-Leitung"

  # ── A.6 Personenbezogene Maßnahmen (8 Controls) ─────────────────────────

  - id: "A.6.1"
    title: "Überprüfung"
    category: "Personenbezogene Maßnahmen"
    applicable: true
    justification: "Hintergrundüberprüfungen reduzieren Insider-Risiken"
    status: "in-umsetzung"
    measures: "Überprüfung für sensible Positionen (Strafregisterauszug, Referenzen) in Abstimmung mit HR"
    evidence:
      - type: ticket
        ref:   "Aufgaben::Audit"
        label: "Überprüfungs-Protokolle (OTOBO)"
    owner: "HR"

  - id: "A.6.2"
    title: "Beschäftigungsbedingungen"
    category: "Personenbezogene Maßnahmen"
    applicable: true
    justification: "Vertragliche IS-Pflichten müssen vor Arbeitsbeginn kommuniziert werden"
    status: "in-umsetzung"
    measures: "Vertraulichkeitserklärung im Arbeitsvertrag; ISMS-Einweisung im Onboarding"
    evidence: []
    owner: "HR"

  - id: "A.6.3"
    title: "IS-Bewusstsein, Schulung und Training"
    category: "Personenbezogene Maßnahmen"
    applicable: true
    justification: "Menschen sind die häufigste Ursache von Sicherheitsvorfällen"
    status: "in-umsetzung"
    measures: "Jährliche Pflichtschulung; Materialien in BookStack; Phishing-Simulation geplant"
    evidence:
      - type: ticket
        ref:   "Aufgaben::Schulung"
        label: "Schulungsnachweise (OTOBO)"
      - type: wiki
        ref:   "Awareness & Schulung"
        label: "Schulungsmaterialien (BookStack)"
    owner: "ISB"

  - id: "A.6.4"
    title: "Disziplinarverfahren"
    category: "Personenbezogene Maßnahmen"
    applicable: true
    justification: "Konsequenzen bei Richtlinienverstößen müssen klar und verhältnismäßig sein"
    status: "umgesetzt"
    measures: "Disziplinarverfahren in Richtlinien verankert und mit HR abgestimmt"
    evidence:
      - type: doc
        ref:   "richtlinien/informationssicherheitsrichtlinie.md"
        label: "Informationssicherheitsleitlinie"
    owner: "HR"

  - id: "A.6.5"
    title: "Verantwortlichkeiten nach Beendigung oder Wechsel der Beschäftigung"
    category: "Personenbezogene Maßnahmen"
    applicable: true
    justification: "Offboarding muss Assets-Rückgabe und Rechteentzug sicherstellen"
    status: "geplant"
    measures: "Offboarding-Checkliste in Entwicklung; Sofortentzug privilegierter Rechte als Pflicht"
    evidence:
      - type: ticket
        ref:   "Aufgaben::Audit"
        label: "Offboarding-Protokolle (OTOBO)"
